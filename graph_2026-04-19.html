    <script>
    let hidden = false;

    document.getElementById("toggleIsolated").onclick = function() {
        hidden = !hidden;

        let connected = new Set();

        edges.forEach(function(e) {
            connected.add(e.from);
            connected.add(e.to);
        });

        nodes.forEach(function(n) {
            if (!connected.has(n.id)) {
                network.body.data.nodes.update({
                    id: n.id,
                    hidden: hidden
                });
            }
        });
    };
