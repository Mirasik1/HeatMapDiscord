                  for (nodeId in allNodes) {
                    nodeColors[nodeId] = allNodes[nodeId].color;

                  allEdges = edges.get({ returnType: "Object" });
                  // adding nodes and edges to the graph
                  data = {nodes: nodes, edges: edges};

                  var options = {"nodes": {"font": {"color": "black", "strokeWidth": 3, "strokeColor": "#ffffff", "align": "top"}}, "physics": {"forceAtlas2Based": {"theta": 0.1, "gravitationalConstant": -250, "springLength": 200, "avoidOverlap": 1}, "solver": "forceAtlas2Based"}};

                  


                  

                  network = new vis.Network(container, data, options);

                  

                  

                  


                  

                  return network;

              }
